<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenue sur Bostaz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a08;
      --cream: #f5f0e8;
      --gold: #c9a84c;
      --gold-light: #e8d08a;
      --charcoal: #1c1c18;
      --muted: #7a7a6e;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* Top line decoration */
    .rule {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--gold));
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fadeDown 1s ease forwards 0.2s;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: scaleY(0); transform-origin: top; }
      to { opacity: 1; transform: scaleY(1); transform-origin: top; }
    }

    /* Checkmark */
    .check-wrap {
      margin-bottom: 2rem;
      opacity: 0;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.5s;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    .check-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      position: relative;
    }

    .check-circle::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.2);
    }

    .check-circle svg {
      width: 24px;
      height: 24px;
      stroke: var(--gold);
      stroke-width: 1.5;
      fill: none;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawCheck 0.6s ease forwards 1s;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* Label */
    .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    /* Heading */
    h1 {
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }

    h1 em {
      font-style: italic;
      color: var(--gold-light);
    }

    /* Subtitle */
    .subtitle {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--muted);
      max-width: 380px;
      line-height: 1.7;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
    }

    /* Steps */
    .steps {
      display: flex;
      gap: 3rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.4s;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .step-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    .step-text {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
    }

    .step-divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      opacity: 0.3;
      align-self: center;
      margin-bottom: 1.2rem;
    }

    /* CTA */
    .cta {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      border: 1px solid var(--gold);
      color: var(--cream);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: background 0.3s ease, color 0.3s ease;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.6s;
    }

    .cta:hover {
      background: var(--gold);
      color: var(--black);
    }

    /* Bottom rule */
    .rule-bottom {
      width: 1px;
      height: 60px;
      background: linear-gradient(to top, transparent, var(--gold));
      margin: 2.5rem auto 0;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.8s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Corner marks */
    .corner {
      position: fixed;
      width: 20px;
      height: 20px;
      border-color: rgba(201,168,76,0.25);
      border-style: solid;
    }
    .corner.tl { top: 24px; left: 24px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 24px; left: 24px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }

    @media (max-width: 600px) {
      .steps { flex-direction: column; gap: 1rem; }
      .step-divider { display: none; }
    }
  </style>
</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="page">
    <div class="rule"></div>

    <div class="check-wrap">
      <div class="check-circle">
        <svg viewBox="0 0 24 24"><polyline points="4 12 9 17 20 7"/></svg>
      </div>
    </div>

    <p class="label">Paiement confirmé</p>

    <h1>Bienvenue sur<br><em>Bostaz</em></h1>

    <p class="subtitle">
      Votre abonnement est actif. Connectez maintenant votre Instagram et Google Calendar pour activer votre assistant de réservation.
    </p>

    <div class="steps">
      <div class="step">
        <span class="step-num">01</span>
        <span class="step-text">Connecter Instagram</span>
      </div>
      <div class="step-divider"></div>
      <div class="step">
        <span class="step-num">02</span>
        <span class="step-text">Connecter Google Calendar</span>
      </div>
      <div class="step-divider"></div>
      <div class="step">
        <span class="step-num">03</span>
        <span class="step-text">Recevoir des réservations</span>
      </div>
    </div>

    <a href="https://bostaz.com" class="cta">Commencer l'intégration</a>

    <div class="rule-bottom"></div>
  </div>

</body>
</html>
